services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - AEGIS_RESEARCH_DB=/app/data/research.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics/"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    environment:
      - AEGIS_API_BASE_URL=http://api:8000

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  sqlite_data:
  chroma_data:
  prometheus_data:
  grafana_data:
