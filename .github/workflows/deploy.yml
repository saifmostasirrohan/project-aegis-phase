name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    branches: [ main ]
    types:
      - completed

jobs:
  ship-to-production:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4
        with:
          # Fetches entire history so Git can handle the upstream sync securely
          fetch-depth: 0

      - name: Deploy Container Stack to Hugging Face Space Registry
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure standard global identity properties
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Add the clean, secure target space URL without raw text embedding
          git remote add hf https://huggingface.co/spaces/saif-rohan/project-aegis
          
          # 3. Inject the authorization token explicitly via Git's native HTTP credential config header wrapper
          git config --global http.https://huggingface.co/.extraheader "Authorization: Bearer $HF_TOKEN"
          
          # 4. Publish only the Phase 4 app folder as the Hugging Face Space root
          git push --force hf "$(git subtree split --prefix phase4_research HEAD):main"
