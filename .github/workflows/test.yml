name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: mock_key_for_ci_linting
      AEGIS_API_KEY: mock_key_for_ci_linting
    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4

      - name: Setup Runtime Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linting and Type Verification Tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio httpx fastapi
          pip install -r requirements.txt

      - name: Code Linting Analysis Check (Ruff)
        run: ruff check .

      - name: Static Type Annotation Validation (Mypy)
        run: mypy --ignore-missing-imports --explicit-package-bases .

      - name: Execute Test Suite Baseline (Pytest)
        run: pytest -v
