name: Aegis Main Deploy

on:
  workflow_run:
    workflows: ["Aegis Main CI"]
    branches: [main]
    types:
      - completed

jobs:
  ship-to-production:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout application code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy Phase 4 app to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          test -n "$HF_TOKEN" || (echo "HF_TOKEN secret is missing" && exit 1)

          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf "https://saif-rohan:${HF_TOKEN}@huggingface.co/spaces/saif-rohan/project-aegis"

          git push --force hf "$(git subtree split --prefix phase4_research HEAD):main"
